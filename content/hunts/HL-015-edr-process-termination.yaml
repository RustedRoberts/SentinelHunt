# ---------------------------------------------------------------------------
# Implementations
# ---------------------------------------------------------------------------
implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // -------------------------------------------------------------------
      // EDR / AV direct process termination
      // Arm 1: kill utilities (taskkill / Stop-Process / WMI) naming a
      //        curated security-product image. LOCAL execution only -
      //        remote WMIC/WinRM does NOT create a kill utility on target.
      // Arm 2: direct OpenProcessApiCall with terminate-capable access
      //        rights against a curated security-product image. Also
      //        carries REMOTE coverage (initiator WmiPrvSE / wsmprovhost).
      // Arm 3: process-END of a curated security image where the
      //        initiating process is a remote broker (WmiPrvSE /
      //        wsmprovhost) - corroborates remote WMIC/WinRM kills.
      // List expanded from ZephrFish/edr-checker (vendor coverage) and
      // converted to EXACT .exe image names - not the raw substrings.
      // -------------------------------------------------------------------
      let lookback = 7d;
      // Curated EDR/AV *process image* names by vendor. Extend/prune per
      // estate before promoting to Production.
      let SecurityProcImages = dynamic([
          // --- Microsoft Defender ---
          "MsMpEng.exe", "MsSense.exe", "SenseIR.exe",
          "SenseCncProxy.exe", "SenseNdr.exe", "NisSrv.exe",
          "MpCmdRun.exe", "SecurityHealthService.exe",
          // --- CrowdStrike ---
          "CSFalconService.exe", "CSFalconContainer.exe",
          // --- SentinelOne ---
          "SentinelAgent.exe", "SentinelServiceHost.exe",
          "SentinelStaticEngine.exe", "SentinelHelperService.exe",
          // --- VMware Carbon Black ---
          "cb.exe", "RepMgr.exe", "RepUx.exe", "RepWSC.exe",
          // --- Cybereason ---
          "CybereasonAP.exe", "CybereasonRansomFree.exe",
          "minionhost.exe", "CrAmTray.exe",
          // --- Palo Alto Cortex XDR / Traps ---
          "cyserver.exe", "cytray.exe", "CyveraService.exe",
          "cyoptics.exe", "cyupdate.exe",
          // --- Trellix / FireEye / McAfee ---
          "xagt.exe", "mfemms.exe", "mfevtps.exe", "macmnsvc.exe",
          "masvc.exe",
          // --- Trend Micro ---
          "TmListen.exe", "Ntrtscan.exe", "TmCCSF.exe", "tmbmsrv.exe",
          "PccNTMon.exe", "coreServiceShell.exe",
          // --- Symantec / Broadcom ---
          "ccSvcHst.exe", "smc.exe", "smcgui.exe", "snac64.exe",
          "symcorpui.exe", "srtsp.sys",
          // --- Sophos ---
          "SavService.exe", "SophosHealth.exe", "SophosFS.exe",
          "swi_service.exe", "SophosCleanM.exe",
          // --- ESET ---
          "ekrn.exe", "egui.exe",
          // --- SecureWorks Red Cloak ---
          "redcloak.exe", "procwall.exe",
          // --- Tanium ---
          "TaniumClient.exe", "TaniumDetectEngine.exe",
          // --- Fortinet FortiEDR ---
          "fortiedr.exe", "FortiEDRCollector.exe",
          // --- Morphisec ---
          "MorphisecServiceAgent.exe",
          // --- Webroot ---
          "WRSA.exe", "WRCore.exe"
      ]);
      // ---- Arm 1: kill utilities in process-creation telemetry ----------
      let KillVerbs = dynamic([
          "/im", "/pid", "/f",     // taskkill
          "stop-process",          // PowerShell
          "call terminate",        // wmic process ... call terminate
          "where name",            // wmic process where name=...
          "-processname",          // Stop-Process -ProcessName
          "-id "                   // Stop-Process -Id
      ]);
      let Arm1 =
          DeviceProcessEvents
          | where Timestamp > ago(lookback)
          | where FileName in~ ("taskkill.exe", "powershell.exe",
                                "pwsh.exe", "wmic.exe")
          | extend CmdLower = tolower(ProcessCommandLine)
          | where CmdLower has_any (KillVerbs)
          | where CmdLower has_any (SecurityProcImages)
          | extend
              Surface          = "ProcessCreate (kill utility)",
              TargetImage      = "",
              AccessRights     = "",
              Detail           = ProcessCommandLine
          | project
              Timestamp, DeviceName, AccountName, Surface,
              ActionUtility    = FileName,
              TargetImage,
              AccessRights,
              Detail,
              InitiatingProcess        = InitiatingProcessFileName,
              InitiatingPath           = InitiatingProcessFolderPath,
              InitiatingProcessSHA256;
      // ---- Arm 2: direct TerminateProcess via OpenProcessApiCall --------
      // PROCESS_TERMINATE = 0x0001, PROCESS_ALL_ACCESS = 0x1fffff.
      let Arm2 =
          DeviceEvents
          | where Timestamp > ago(lookback)
          | where ActionType == "OpenProcessApiCall"
          | where FileName in~ (SecurityProcImages)   // target image
          | extend AccessRightsStr = tostring(AdditionalFields.DesiredAccess)
          | extend AccessRightsNum = tolong(AdditionalFields.DesiredAccess)
          | where AccessRightsStr has_any ("0x1", "0x1fffff")
               or (AccessRightsNum & 1) != 0
               or AccessRightsNum == 2097151
          // Exclude security products legitimately inspecting each other -
          // refine by SHA256 in tuning rather than filename.
          | where InitiatingProcessFolderPath !startswith @"C:\Program Files\Windows Defender"
                and InitiatingProcessFileName !in~ (SecurityProcImages)
          | extend
              Surface          = "OpenProcessApiCall (direct terminate)",
              ActionUtility    = "",
              Detail           = strcat("DesiredAccess=", AccessRightsStr)
          | project
              Timestamp, DeviceName, AccountName, Surface,
              ActionUtility,
              TargetImage      = FileName,
              AccessRights     = AccessRightsStr,
              Detail,
              InitiatingProcess        = InitiatingProcessFileName,
              InitiatingPath           = InitiatingProcessFolderPath,
              InitiatingProcessSHA256;
      // ---- Arm 3: broker-initiated termination of a security image -----
      // Corroborates remote WMIC / WinRM kills. On the target the killer
      // is WmiPrvSE.exe (WMI) or wsmprovhost.exe (WinRM), not a kill
      // utility - so this looks at the process-END side: a curated
      // security image terminating with one of those brokers as the
      // initiating process.
      let RemoteBrokers = dynamic(["WmiPrvSE.exe", "wsmprovhost.exe"]);
      let Arm3 =
          DeviceProcessEvents
          | where Timestamp > ago(lookback)
          | where ActionType == "ProcessTerminated"
          | where FileName in~ (SecurityProcImages)        // the killed image
          | where InitiatingProcessFileName in~ (RemoteBrokers)
          | extend
              Surface          = "ProcessTerminated (remote broker)",
              ActionUtility    = "",
              AccessRights     = "",
              Detail           = strcat("Killed via ",
                                        InitiatingProcessFileName,
                                        " (remote WMI/WinRM broker)")
          | project
              Timestamp, DeviceName, AccountName, Surface,
              ActionUtility,
              TargetImage      = FileName,
              AccessRights,
              Detail,
              InitiatingProcess        = InitiatingProcessFileName,
              InitiatingPath           = InitiatingProcessFolderPath,
              InitiatingProcessSHA256;
      union Arm1, Arm2, Arm3
      | order by Timestamp desc

