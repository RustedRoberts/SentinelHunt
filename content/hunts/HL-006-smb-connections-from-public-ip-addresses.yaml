implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // 1. Successful SMB connections from public IPs
      let SuccessfulSMB = DeviceNetworkEvents
      | where RemoteIPType == "Public"                                                                    // Only public-facing source IPs
      | where RemotePort == 445                                                                           // SMB port
      | where ActionType == "ConnectionSuccess"                                                           // Successful connections only
      | extend LocationDetails = geo_info_from_ip_address(RemoteIP)                                       // Geo-locate the remote IP
      | extend RemoteIPGeoData = strcat(tostring(LocationDetails.city), ", ", tostring(LocationDetails.country)); // Format as "City, Country"
      // 2. Successful connection counts per IP per device
      let SuccessCounts = SuccessfulSMB
      | summarize
          SuccessfulConnections = count(),                                                                // Total successful connections for this IP/device pair
          SuccessTimeRange = strcat(format_datetime(min(Timestamp), "yyyy-MM-dd HH:mm"), " to ", format_datetime(max(Timestamp), "yyyy-MM-dd HH:mm"))  // First to last success
          by RemoteIP, DeviceName;                                                                        // Scoped per source IP per target device
      // 3. Any failed connections from those same public IPs, on any device, any port
      let FailedByIP = DeviceNetworkEvents
      | where ActionType == "ConnectionFailed"                                                            // Failed connections only
      | where RemoteIP in ((SuccessfulSMB | distinct RemoteIP))                                           // Only IPs that had a successful SMB connection
      | summarize
          FailedAttemptsByIP = count(),                                                                   // Total failed attempts from this IP
          FailedDevices = make_set(DeviceName, 25),                                                       // Which devices saw failures from this IP
          FailedPorts = make_set(RemotePort, 25),                                                         // Which ports were tried — useful for spotting scanning
          FailedTimeRange = strcat(format_datetime(min(Timestamp), "yyyy-MM-dd HH:mm"), " to ", format_datetime(max(Timestamp), "yyyy-MM-dd HH:mm"))  // First to last failure
          by RemoteIP;                                                                                    // Grouped by source IP regardless of target
      // 4. Failed SMB connections from any public IP against the same devices that had a successful SMB connection
      let FailedSMBByDevice = DeviceNetworkEvents
      | where RemoteIPType == "Public"                                                                    // Public sources only
      | where RemotePort == 445                                                                           // SMB port
      | where ActionType == "ConnectionFailed"                                                            // Failed connections only
      | where DeviceName in ((SuccessfulSMB | distinct DeviceName))                                       // Only devices that had a successful SMB connection
      | summarize
          FailedSMBAttempts = count(),                                                                    // Total failed SMB attempts against this device
          FailedSMBSourceIPs = make_set(RemoteIP, 25),                                                    // Which public IPs failed — may differ from the successful one
          FailedSMBTimeRange = strcat(format_datetime(min(Timestamp), "yyyy-MM-dd HH:mm"), " to ", format_datetime(max(Timestamp), "yyyy-MM-dd HH:mm"))  // First to last failure
          by DeviceName;                                                                                  // Grouped by target device regardless of source
      // Bring it all together
      SuccessfulSMB
      | join kind=leftouter (SuccessCounts) on RemoteIP, DeviceName                                       // Enrich with successful connection counts
      | join kind=leftouter (FailedByIP) on RemoteIP                                                      // Enrich with failure context for the same source IP
      | join kind=leftouter (FailedSMBByDevice) on DeviceName                                             // Enrich with SMB failure context for the same target device
      | project
          Timestamp,
          DeviceName,
          RemoteIP,
          RemoteIPGeoData,
          RemotePort,
          SuccessfulConnections = coalesce(SuccessfulConnections, 0),                                     // Default to 0 if no match
          SuccessTimeRange = iff(isempty(SuccessTimeRange), "None", SuccessTimeRange),                     // Default to "None" if no match
          FailedAttemptsByIP = coalesce(FailedAttemptsByIP, 0),                                            // Default to 0 if no match
          FailedDevices = iff(isempty(tostring(FailedDevices)), "None", tostring(FailedDevices)),           // Cast dynamic to string before empty check
          FailedPorts = iff(isempty(tostring(FailedPorts)), "None", tostring(FailedPorts)),                 // Cast dynamic to string before empty check
          FailedTimeRange = iff(isempty(FailedTimeRange), "None", FailedTimeRange),                        // Default to "None" if no match
          FailedSMBAttempts = coalesce(FailedSMBAttempts, 0),                                              // Default to 0 if no match
          FailedSMBSourceIPs = iff(isempty(tostring(FailedSMBSourceIPs)), "None", tostring(FailedSMBSourceIPs)), // Cast dynamic to string before empty check
          FailedSMBTimeRange = iff(isempty(FailedSMBTimeRange), "None", FailedSMBTimeRange)                // Default to "None" if no match

