implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      let baselineLookback = 30d;                                                                       // how far back to look for prior legitimate device code usage
      let detectionWindow = 1d;                                                                         // window to scan for new (first-time) device code sign-ins
      let DeviceCodeSignIns =                                                                            // successful device code sign-ins across the full lookback
          union SigninLogs, AADNonInteractiveUserSignInLogs
          | where TimeGenerated > ago(baselineLookback)
          | where AuthenticationProtocol == "deviceCode"                                                 // OAuth 2.0 device authorization grant only
          | where ResultType == 0                                                                         // successful completions only - failed attempts did not yield a token
          | extend DeviceDetail = coalesce(                                                              // normalise DeviceDetail across the two source tables
              column_ifexists("DeviceDetail_dynamic", dynamic(null)),
              todynamic(column_ifexists("DeviceDetail_string", "")))
          | project
              TimeGenerated,
              UserPrincipalName,
              UserId,
              IPAddress,
              AppId,
              AppDisplayName,
              ResourceDisplayName,
              AuthenticationRequirement,
              ConditionalAccessStatus,
              DeviceOS = tostring(DeviceDetail.operatingSystem),
              UserAgent,
              CorrelationId;
      let Baseline =                                                                                     // identities/IP combos with a device code success BEFORE the detection window
          DeviceCodeSignIns
          | where TimeGenerated < ago(detectionWindow)
          | summarize BaselineUserSeen = 1 by UserPrincipalName
          | project UserPrincipalName;
      let BaselineUserAndIP =                                                                             // same, but keyed on user+IP for the tighter secondary check
          DeviceCodeSignIns
          | where TimeGenerated < ago(detectionWindow)
          | summarize BaselineUserIPSeen = 1 by UserPrincipalName, IPAddress
          | project UserPrincipalName, IPAddress;
      DeviceCodeSignIns
      | where TimeGenerated >= ago(detectionWindow)                                                       // scope to the current detection window
      | join kind=leftanti Baseline on UserPrincipalName                                                   // drop rows where the user already had device code success in the baseline
      | extend IsFirstTimeForUser = true
      | join kind=leftouter (                                                                              // separately flag whether this specific user+IP combo is also new
          BaselineUserAndIP | extend IsFirstTimeForUserAndIP = false
        ) on UserPrincipalName, IPAddress
      | extend IsFirstTimeForUserAndIP = iff(isnotempty(IsFirstTimeForUserAndIP), IsFirstTimeForUserAndIP, true)
      | project
          TimeGenerated,
          UserPrincipalName,
          IsFirstTimeForUser,
          IsFirstTimeForUserAndIP,
          IPAddress,
          AppId,
          AppDisplayName,
          ResourceDisplayName,
          AuthenticationRequirement,
          ConditionalAccessStatus,
          DeviceOS,
          UserAgent,
          CorrelationId,
          UserId
      | sort by TimeGenerated desc

