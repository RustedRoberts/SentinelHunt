implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // ── Behavioural firewall tampering — aggregated hunt
      // Surfaces non-system processes modifying Windows Firewall config,
      // aggregated by account, device, and initiating process to highlight
      // anomalous volume and rare process lineage.

      DeviceProcessEvents
      | where Timestamp > ago(14d)                                                    // Lookback window — adjust to match hunt cadence
      | where ProcessCommandLine has_any (
          "New-NetFirewallRule", "Set-NetFirewallRule", "Remove-NetFirewallRule",      // PowerShell firewall cmdlets
          "Set-NetFirewallProfile", "Disable-NetFirewallRule", "Enable-NetFirewallRule",
          "netsh advfirewall firewall add rule",                                      // netsh equivalents
          "netsh advfirewall firewall delete rule",
          "netsh advfirewall set"
      )
      | where ProcessIntegrityLevel != "System"                                       // Exclude GPO / endpoint management (SYSTEM-level)
      | extend FirewallAction = case(
          ProcessCommandLine has_any ("Remove-NetFirewallRule", "delete rule"),   "Delete",       // Rule removal
          ProcessCommandLine has_any ("Disable-NetFirewallRule", "set allprofiles state off",
                                      "set currentprofile state off"),            "Disable",      // Profile or rule disabled
          ProcessCommandLine has_any ("New-NetFirewallRule", "add rule"),         "Create",       // New rule creation
          ProcessCommandLine has_any ("Set-NetFirewallRule", "Set-NetFirewallProfile",
                                      "Enable-NetFirewallRule"),                  "Modify",       // Existing rule/profile changed
          "Other"
      )
      | summarize
          TotalChanges        = count(),                                              // Volume of changes per grouping
          Actions             = make_set(FirewallAction),                             // Distinct action types observed
          InitiatingProcesses = make_set(InitiatingProcessFileName),                  // All parent processes involved
          EarliestChange      = min(Timestamp),                                       // First seen in window
          LatestChange        = max(Timestamp),                                       // Last seen in window
          SampleCommands      = make_set(ProcessCommandLine, 5)                       // Up to 5 sample command lines for triage
        by AccountName, AccountUpn, DeviceName, InitiatingProcessFileName             // Group per account x device x process
      | order by TotalChanges desc                                                    // Highest volume first

