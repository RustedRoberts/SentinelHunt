id: HL-003
title: LSASS Memory Access for Credential Dumping
summary: >
  Detects processes opening a handle to lsass.exe with permissions associated with memory
  reading — a primary indicator of credential-dumping tools such as Mimikatz, procdump,
  and comsvcs.dll. This technique targets NTLM hashes and Kerberos tickets stored in
  LSASS process memory.
hypothesis: |
  The Windows Local Security Authority Subsystem Service (`lsass.exe`) holds authentication
  material in memory including NTLM hashes, Kerberos tickets, and WDigest credentials on
  older OS versions. Adversaries routinely dump this process to obtain credentials for
  lateral movement and privilege escalation.

  Legitimate processes rarely need to open LSASS with `PROCESS_VM_READ` or
  `PROCESS_ALL_ACCESS` rights. Any non-system, non-EDR process requesting these access
  rights against PID 4 or the LSASS process represents a high-fidelity indicator of
  credential dumping activity.
author: RustedRoberts
updated: "2026-04-25"
version: "1.0"

tactics:
  - Credential Access

techniques:
  - id: T1003.001
    name: "LSASS Memory"

platforms:
  - Windows

methodology: Signature
maturity: Promoted
signal: High

dataSources:
  - product: Microsoft Defender for Endpoint
    table: DeviceProcessEvents
    required: true
  - product: Microsoft Defender for Endpoint
    table: DeviceEvents
    required: true
  - product: Windows Security
    table: SecurityEvent
    required: false

whatYoullSee: |
  `DeviceEvents` with `ActionType == "OpenProcessApiCall"` where the `FileName` of the
  target process is `lsass.exe` and the requesting process is not a known security product
  or Windows system component. Access rights in `AdditionalFields` will include bitmasks
  that cover `PROCESS_VM_READ` (0x0010) or `PROCESS_ALL_ACCESS` (0x1fffff).

  In `DeviceProcessEvents`, look for `procdump.exe`, `comsvcs.dll` loaded via `rundll32.exe`,
  or anomalously named executables accessing the LSASS process image path via MiniDump
  functionality.

investigationSteps:
  - "Identify the accessing process: note `InitiatingProcessFileName`, `InitiatingProcessFolderPath`,
    and the file hash. Is this a known security product (CrowdStrike, Defender, Carbon Black)
    or system binary? If so, this is likely a false positive."
  - "Check the binary: submit the `SHA256` of the accessing process to your threat intelligence
    platform. Unknown or low-prevalence binaries are significant."
  - "Review the process tree: what spawned the accessing process? A chain ending in
    `cmd.exe` or `powershell.exe` from a user context is a strong indicator of an
    attacker-controlled execution path."
  - "Check for credential reuse within 30 minutes: look for new network logon events
    (Event ID 4624 Type 3) from the same host using accounts not previously active on
    that device — this indicates the dumped credentials were used for lateral movement."
  - "Isolate the affected host and preserve the process memory image if the organisation's
    IR procedure requires forensic analysis."

falsePositives:
  - EDR and AV agents that legitimately scan LSASS to detect injected DLLs or to provide
    credential-theft protection (e.g., Microsoft Defender Credential Guard integration).
  - Enterprise password managers or SSO agents that integrate with SSPI.
  - Some backup and system-imaging solutions that open process handles for VSS-consistency
    checks.

curatorNotes: |
  This hunt is Promoted — the true-positive rate is high enough to operate as a P1 analytic
  rule in most enterprise environments. The primary tuning requirement is building an exclusion
  list of known-legitimate processes by SHA256 hash, not by filename, to prevent exclusion
  bypass via renamed binaries.

  Consider pairing this with an alert on `DeviceImageLoadEvents` where `FileName == "comsvcs.dll"`
  and the loading process is `rundll32.exe` — this catches the `MiniDump` export abuse path
  that bypasses process-access event logging on some OS versions.

references:
  - label: "MITRE ATT&CK: OS Credential Dumping — LSASS Memory (T1003.001)"
    url: https://attack.mitre.org/techniques/T1003/001/
  - label: "Microsoft: Credential protection and management"
    url: https://learn.microsoft.com/en-us/windows-server/security/credentials-protection-and-management/
  - label: "gentilkiwi/mimikatz — reference implementation"
    url: https://github.com/gentilkiwi/mimikatz

implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      DeviceEvents
      | where Timestamp > ago(1d)
      | where ActionType == "OpenProcessApiCall"
      | where FileName =~ "lsass.exe"
      // Filter to memory-read-capable access rights
      | extend AccessRights = tolong(AdditionalFields.DesiredAccess)
      | where AccessRights has_any ("0x1fffff", "0x1010", "0x40", "0x10")
           or AccessRights == 2097151   // PROCESS_ALL_ACCESS
           or (AccessRights & 16) != 0  // PROCESS_VM_READ bit
      // Exclude known-good security product processes by path prefix
      | where InitiatingProcessFolderPath !startswith @"C:\Program Files\Windows Defender"
            and InitiatingProcessFolderPath !startswith @"C:\Program Files\Microsoft Security Client"
      | project
          Timestamp,
          DeviceName,
          AccountName,
          AccessingProcess = InitiatingProcessFileName,
          AccessingProcessPath = InitiatingProcessFolderPath,
          ProcessHash = InitiatingProcessSHA256,
          AccessRights = tostring(AdditionalFields.DesiredAccess)
      | order by Timestamp desc

relatedHunts:
  - HL-001
