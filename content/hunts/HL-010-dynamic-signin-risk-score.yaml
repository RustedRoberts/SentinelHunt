methodology: Behavioural
maturity: Experimental
signal: Medium

# ---------------------------------------------------------------------------
# Data sources
# ---------------------------------------------------------------------------
dataSources:
  - product: Microsoft Entra ID
    table: SigninLogs
    required: true

# ---------------------------------------------------------------------------
# Detection detail
# ---------------------------------------------------------------------------
whatYoullSee: |
  A true positive is a successful interactive sign-in whose summed score
  lands in the High or Critical band because several independent factors
  fire together for the same session:

  - `Location` resolves to a country the user has not signed in from in the
    prior 30 days (+30).
  - `DeviceDetail.deviceId` is empty or not in the user's 30-day device set,
    i.e. a brand-new device (+25). A previously-seen but non-compliant
    device scores 0 here by design.
  - The sign-in falls outside the fixed working window (07:00–19:00 UK
    local time by default) (+15).
  - The target application (`AppDisplayName` / `ResourceDisplayName`) is on
    the sensitive-app watchlist — Azure portal, Graph, admin consoles (+15).
  - The network is not an Entra trusted/named location
    (`NetworkLocationDetails` lacks `trustedNamedLocation`) (+10).
  - Entra's own `riskLevelDuringSignIn` is medium/high, corroborating the
    locally computed score (+15).

  The distinguishing cue is *clustering*: a benign new-country sign-in is
  usually from a known device during normal hours to a low-sensitivity app
  (score stays Low/Medium). Compromise tends to light up location + new
  device + odd hour + sensitive target simultaneously, pushing the band to
  High/Critical. Analysts should read the per-factor breakdown, never the
  total alone.

# ---------------------------------------------------------------------------
# Triage and investigation
# ---------------------------------------------------------------------------
investigationSteps:
  - "Read the score breakdown, not the total: `ScoreReasons` is a dynamic
    array of the factors that fired (e.g. `[\"New-Country(+30)\",
    \"Unseen-Device(+25)\"]`). Inspect array length and contents — a score
    driven by a single element (e.g. only `New-Country`) is usually benign
    travel and can be deprioritised; a score spread across location +
    device + hour + sensitive-app is high-fidelity. The array can be
    expanded with `mv-expand` for per-factor aggregation across many
    sign-ins."
  - "Validate the location: is the resolved country plausible for this
    user? Cross-check `AuthenticationDetails` for impossible travel against
    the user's previous sign-in in `SigninLogs` within the last few hours
    (a London sign-in followed 40 minutes later by a Lagos sign-in is
    decisive)."
  - "Inspect the device: note `DeviceDetail.deviceId`, `displayName`,
    `operatingSystem`, `isCompliant`, `isManaged`. A null deviceId on a
    web sign-in is common and not alone conclusive — weigh it with the
    other factors rather than treating absence of data as malicious."
  - "Check the conditional access and MFA outcome: did the session satisfy
    MFA (`AuthenticationRequirement`, `ConditionalAccessStatus`)? A
    high-score sign-in that bypassed or failed MFA is materially more
    serious than one that fully satisfied a strong CA policy."
  - "Pivot to post-authentication activity: if the target app is sensitive,
    query `AuditLogs` and `CloudAppEvents` for actions by this user in the
    30 minutes following the sign-in — role assignments, app consents,
    mailbox rule creation, or token issuance indicate the access was used,
    not merely established."
  - "Correlate with prior failed sign-ins: look for `ResultType != 0`
    events for the same user from the same IP/ASN in the preceding hours —
    a burst of failures followed by the scored success indicates brute
    force or password spray (T1110) preceding the valid-account abuse."
  - "If confirmed, treat as credential compromise: revoke sessions, force
    password reset and re-registration of MFA, and review what the account
    could reach during the exposure window."

falsePositives:
  - "Genuine business travel — a user legitimately working from a new
    country on their normal corporate device during reasonable local hours.
    The graded device factor and clustering requirement are designed to
    keep these in the Low/Medium band."
  - "Hardware refresh or first sign-in from a newly issued corporate device,
    which produces an unseen `deviceId` until the baseline catches up."
  - "Shift workers, on-call staff, and night-shift roles whose legitimate
    sign-ins routinely fall outside the 07:00–19:00 UK-local window — this
    factor will fire on every such sign-in. Suppress or zero-weight the
    time factor for known 24x7 roles, or widen the window per population."
  - "Users genuinely working in distant timezones: the window is evaluated
    in UK local time, so a user whose normal day is, e.g., US Pacific or
    APAC hours may fall outside it consistently and accrue a constant +15.
    By design this hunt targets a UK-centric audience and treats these as
    EXPECTED output resolved at analyst triage, not a defect to tune out:
    an off-shore user tripping only `Off-Hours(+15)` is precisely the
    single-factor case investigation step 1 deprioritises via the
    `ScoreReasons` breakdown. Do NOT zero-weight or suppress the time
    factor to silence this on a primarily-UK estate — doing so discards
    signal that is wanted for the in-scope population. Suppression is only
    appropriate for a materially non-UK or 24x7 estate (see curatorNotes)."
  - "VPN, tethering, or ISP CGNAT causing the source to fall outside trusted
    named locations even for a stationary user (this is why network is only
    weighted +10)."
  - "Baseline cold-start: new joiners and returners from extended leave have
    a thin or empty 30-day baseline and will score highly until history
    accumulates. Suppress or down-weight accounts with fewer than N prior
    sign-ins in the window."

# ---------------------------------------------------------------------------
# Curator notes
# ---------------------------------------------------------------------------
curatorNotes: |
  Maturity is Experimental: the factor weights below are a reasoned starting
  point, NOT empirically calibrated for any specific tenant. They must be
  tuned against a labelled set of known-good and known-bad sign-ins before
  this is promoted toward Production. Do not operationalise the raw bands
  as an alert rule without that calibration.

  Design decisions worth preserving:

  - Additive transparent model was chosen deliberately over multiplicative
    so that every score is auditable and re-tunable by anyone lifting this
    from the public library. Factor interactions (e.g. new-device matters
    more when also new-country) are expressed as a conditional *bonus*
    block, not true multiplication, to keep the arithmetic legible.
  - The 30-day baseline is computed inline in the same query. For large
    tenants this is expensive on every run; the recommended optimisation is
    to materialise the per-user baseline (countries, deviceIds, hour band,
    trusted networks) into a summary table refreshed daily and join against
    it, rather than recomputing the lookback each execution. Flagged here
    so it is not a silent performance surprise.
  - Device trust is intentionally a graded ladder (compliant>known>unseen)
    NOT compliant-vs-not. Tenant Intune/compliance coverage is mixed; null
    compliance is scored neutral, not untrusted, to avoid a large benign
    false-positive class. Changing this to "null == untrusted" is a
    legitimate tightening choice for a fully managed estate but must be a
    conscious decision.
  - Time-of-day uses a FIXED working window (07:00–19:00) evaluated in UK
    local time, NOT a per-user hour baseline. This is a deliberate
    simplification chosen for legibility on a UK-centric estate. It is the
    one factor that is not behavioural. Two consequences are documented
    rather than hidden: (a) it is correct year-round because the query
    converts UTC to Europe/London (BST/GMT handled), not raw UTC; (b) it
    is structurally wrong for users whose legitimate working hours sit
    outside UK daytime — night-shift, on-call, and genuinely
    distant-timezone users will accrue a constant +15. For materially
    non-UK or 24x7 populations the correct action is to zero the time
    factor's weight or suppress it per population, NOT to widen the window
    so far it becomes meaningless. An honest alternative for heavily
    global estates is to drop this factor entirely and rebalance the
    remaining weights — left as a tuning decision for the implementer.
    OPERATING ASSUMPTION FOR THIS HUNT: the intended audience is
    UK-based. Off-shore / off-hours sign-ins flagged by this factor are
    treated as EXPECTED output triaged by analyst knowledge at runtime
    (via the per-factor `ScoreReasons` array), not as a defect to remove.
    The suppression guidance above applies ONLY when re-deploying this
    hunt against a materially non-UK or 24x7 estate — on the intended
    UK-centric estate the factor is left live by design and the residual
    false positives are an accepted, human-handled cost.
  - "User behaviour: what is the user attempting to access" from the
    original concept is deliberately reduced to *target application
    sensitivity* only. True intent analysis requires post-auth telemetry
    (AuditLogs / CloudAppEvents) and belongs in a correlated follow-on
    hunt — see relatedHunts. Scoring "intent" from SigninLogs alone would
    produce an unreliable number.
  - Entra-native risk is corroboration only (+15), never the primary
    driver. If Identity Protection is not licensed/enabled in the tenant
    that factor silently contributes 0 — acceptable degradation, but note
    it so a missing P2 licence is not mistaken for low risk.

  Suggested promotion criteria: ROC/precision measured against a labelled
  month of sign-ins, band thresholds set from that distribution, and the
  baseline materialised before the analytic runs at tenant scale.

