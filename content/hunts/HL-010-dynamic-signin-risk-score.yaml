# ---------------------------------------------------------------------------
# Implementations
# ---------------------------------------------------------------------------
implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // ===================================================================
      // Dynamic Multi-Factor Sign-In Risk Score
      // -------------------------------------------------------------------
      // Builds a 30-day per-user behavioural baseline, then scores each
      // successful interactive sign-in in the evaluation window against it.
      // Transparent additive model: each factor adds points; reasons are
      // emitted alongside the total so analysts triage the breakdown,
      // never the number alone.
      // ===================================================================
      // --- Tunable parameters -------------------------------------------
      let lookback        = 30d;   // baseline history window
      let evalWindow       = 1d;   // sign-ins scored on this run
      let minBaselineCount = 5;    // min prior sign-ins before scoring (cold-start guard)
      // Fixed working-window definition for the time-of-day factor.
      // Evaluated in UK local time (Europe/London) so that BST is handled
      // correctly and the window means the same thing year-round. See
      // curatorNotes for the distant-timezone limitation.
      let workStartHour = 7;       // inclusive  (07:00 local)
      let workEndHour   = 19;      // exclusive  (up to 18:59 local)
      let signInTZ      = "Europe/London";
      // Sensitive target applications (tune to environment).
      let SensitiveApps = dynamic([
          "Azure Portal",
          "Microsoft Graph",
          "Microsoft Azure PowerShell",
          "Azure Active Directory PowerShell",
          "Microsoft Azure CLI",
          "Microsoft Admin Web UI"
      ]);
      // --- Successful interactive sign-ins in the evaluation window ------
      let CurrentSignins =
          SigninLogs
          | where TimeGenerated > ago(evalWindow)
          | where ResultType == 0                       // successful only
          | where AuthenticationRequirement != ""       // interactive
          | extend
              Country  = tostring(LocationDetails.countryOrRegion),
              DeviceId = tostring(DeviceDetail.deviceId),
              IsCompliant = tobool(DeviceDetail.isCompliant),
              IsManaged   = tobool(DeviceDetail.isManaged),
              // UK-local hour; datetime_utc_to_local handles GMT/BST so the
              // fixed window is correct year-round, not UTC-skewed.
              LocalHour   = datetime_part("hour",
                                datetime_utc_to_local(TimeGenerated, signInTZ)),
              TrustedNet  = tostring(NetworkLocationDetails) has "trustedNamedLocation",
              TargetApp   = coalesce(tostring(AppDisplayName), tostring(ResourceDisplayName)),
              NativeRisk  = tostring(RiskLevelDuringSignIn);
      // --- 30-day per-user baseline -------------------------------------
      // Computed inline; for tenant scale, materialise this to a summary
      // table refreshed daily and join instead (see curatorNotes).
      // Note: no hour history is collected — the time factor uses a fixed
      // working window, not a per-user hour baseline.
      let Baseline =
          SigninLogs
          | where TimeGenerated between (ago(lookback) .. ago(evalWindow))
          | where ResultType == 0
          | extend
              Country  = tostring(LocationDetails.countryOrRegion),
              DeviceId = tostring(DeviceDetail.deviceId)
          | summarize
              KnownCountries = make_set(Country, 250),
              KnownDevices   = make_set(DeviceId, 500),
              PriorSignins   = count()
            by UserPrincipalName;
      CurrentSignins
      | join kind=leftouter (Baseline) on UserPrincipalName
      // Cold-start guard: skip users without enough history to baseline.
      | where isnull(PriorSignins) == false and PriorSignins >= minBaselineCount
      // ---- Factor 1: location familiarity (+30) -----------------------
      // set_has_element does exact, type-aware element equality — unlike
      // `contains`, which is a substring match and would mismatch
      // (e.g. country "US" substring-matching inside other values).
      | extend f_loc =
            iff(set_has_element(KnownCountries, Country) == false, 30, 0)
      // ---- Factor 2: device trust / familiarity (graded) --------------
      //   compliant+managed  -> trusted (0)
      //   previously seen    -> neutral (0)   [null compliance NOT punished]
      //   brand-new / unseen -> high     (+25)
      | extend f_dev =
            case(
                IsCompliant == true and IsManaged == true, 0,
                set_has_element(KnownDevices, DeviceId) and DeviceId != "", 0,
                25)
      // ---- Factor 3: time-of-day deviation (+15) ----------------------
      //   Fires when the sign-in falls outside the fixed working window
      //   (workStartHour inclusive .. workEndHour exclusive) evaluated in
      //   UK local time. This is a deliberately simple, legible definition
      //   suitable for a UK-centric estate; it is NOT per-user behavioural.
      //   Distant-timezone users should have this factor down-weighted or
      //   suppressed — see curatorNotes / falsePositives.
      | extend f_time =
            iff(LocalHour < workStartHour or LocalHour >= workEndHour, 15, 0)
      // ---- Factor 4: target application sensitivity (+15) -------------
      | extend f_app =
            iff(TargetApp in~ (SensitiveApps), 15, 0)
      // ---- Factor 5: network trust (+10) ------------------------------
      | extend f_net =
            iff(TrustedNet == "True", 0, 10)
      // ---- Factor 6: Entra-native corroboration (+15) -----------------
      //   Contributes 0 if Identity Protection is unlicensed/disabled.
      | extend f_native =
            iff(NativeRisk in ("medium", "high"), 15, 0)
      // ---- Conditional interaction bonus ------------------------------
      //   New country AND new device together is disproportionately
      //   indicative of compromise vs either alone (+15). Expressed as a
      //   legible bonus, not multiplication.
      | extend f_bonus =
            iff(f_loc > 0 and f_dev > 0, 15, 0)
      // ---- Total + transparent reason array ---------------------------
      | extend RiskScore = f_loc + f_dev + f_time + f_app + f_net + f_native + f_bonus
      // Build the candidate reason array, then strip the empty slots for
      // factors that did not fire. KQL has no array-filter primitive, so
      // set_difference against [""] is the idiomatic way to drop blanks
      // while preserving a true dynamic() column for downstream parsing.
      | extend ScoreReasons = set_difference(pack_array(
            iff(f_loc    > 0, "New-Country(+30)", ""),
            iff(f_dev    > 0, "Unseen-Device(+25)", ""),
            iff(f_time   > 0, "Off-Hours(+15)", ""),
            iff(f_app    > 0, "Sensitive-App(+15)", ""),
            iff(f_net    > 0, "Untrusted-Network(+10)", ""),
            iff(f_native > 0, "Entra-Native-Risk(+15)", ""),
            iff(f_bonus  > 0, "Country+Device-Combo(+15)", "")
        ), pack_array(""))
      | extend RiskBand =
            case(
                RiskScore >= 70, "Critical",
                RiskScore >= 45, "High",
                RiskScore >= 25, "Medium",
                "Low")
      | where RiskBand in ("High", "Critical")   // surface actionable only
      | project
          TimeGenerated,
          UserPrincipalName,
          RiskScore,
          RiskBand,
          ScoreReasons,
          Country,
          IPAddress,
          TargetApp,
          DeviceId,
          IsCompliant,
          IsManaged,
          NativeRisk,
          ConditionalAccessStatus,
          AuthenticationRequirement
      | order by RiskScore desc, TimeGenerated desc

