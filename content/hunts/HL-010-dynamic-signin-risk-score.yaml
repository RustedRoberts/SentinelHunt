# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
id: HL-010
title: Dynamic Multi-Factor Sign-In Risk Score
summary: >
  Computes a transparent, additive risk score for every interactive Entra ID
  sign-in by comparing it against a 30-day per-user behavioural baseline.
  Factors scored independently and summed: geolocation familiarity, device
  trust and familiarity, time-of-day deviation, target application
  sensitivity, network trust, and Entra-native risk corroboration. The score
  surfaces credential-compromise sessions that individually look benign but
  are collectively anomalous, without relying on the opaque Identity
  Protection model alone.
hypothesis: |
  An attacker using valid but stolen credentials (T1078.004) rarely
  reproduces the legitimate owner's full behavioural envelope at once. They
  typically authenticate from an unfamiliar country, on a never-before-seen
  device, outside the user's usual working hours, from an untrusted network
  — but each of these in isolation also occurs benignly (travel, a new
  laptop, late working, tethered hotspot).

  No single signal is reliable, but their *coincidence within one session*,
  weighted and summed, separates compromise from noise. This hunt builds a
  per-user baseline over a 30-day lookback from `SigninLogs` — the set of
  countries and device IDs the user has demonstrably used, plus the
  named/trusted networks — then scores each new successful sign-in against
  that baseline. Time-of-day is scored separately against a fixed working
  window in UK local time rather than a per-user hour baseline (a
  deliberate simplification — see curatorNotes). Entra-native fields
  (`riskLevelDuringSignIn`, `riskState`, `riskEventTypes`) are carried
  alongside the locally computed score for corroboration rather than as
  the primary signal, since the
  native model is not analyst-tunable.

  Device trust is graded, not binary: a managed + compliant device scores as
  trusted; a previously-seen device with no compliance data is treated as
  neutral (NOT untrusted); only a brand-new, unseen device scores as
  high-risk. This deliberately avoids penalising the tenant's mixed
  Intune/compliance coverage, where a legitimate unenrolled device is
  otherwise indistinguishable from an attacker device.
author: RustedRoberts
updated: "2026-05-16"
version: "1.0"

