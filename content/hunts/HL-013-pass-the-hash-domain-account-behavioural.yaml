implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // -----------------------------------------------------------------------
      // Scenario - Pass-the-Hash via stolen DOMAIN account hash.
      // HUNT query: low fidelity is acceptable; output is a ranked triage
      // shortlist for human review, NOT an alert and NOT a verdict.
      //
      // The domain-exclusion lever from the local-account hunt is unavailable
      // here (the account legitimately belongs to a known domain), so it is
      // deliberately removed and replaced with behavioural shape:
      //   - fan-out across distinct destination hosts
      //   - NTLM where the account would normally use Kerberos
      //   - source-host / source-IP spread
      //   - burst timing
      // -----------------------------------------------------------------------
      let lookback = 30d;
      // Step 1: the NTLM network-logon population for KNOWN domains only.
      // This is the inverse of the local-account hunt: here we WANT the
      // known-domain accounts, because this scenario lives inside them.
      let NtlmNetwork =
          SecurityEvent
          | where TimeGenerated > ago(lookback)
          | where EventID == 4624
          | where LogonType == 3
          // CORRECTED: source query had "NtLmSsp " with a trailing space,
          // which matches zero rows in SecurityEvent (the field has no
          // trailing whitespace) and would silently break the entire hunt.
          // Fixed to the correct value. See curatorNotes for the rationale.
          | where LogonProcessName contains "NtLmSsp"
          | where KeyLength == 0
          | where TargetUserName !endswith "$"
          | where TargetUserName !~ "ANONYMOUS LOGON"
          // Keep ONLY the legitimate domains - the opposite of the
          // local-account posture. Adjust the set to the client estate.
          | where TargetDomainName in~ ("domain1", "domain2", "domain3")
          | extend NullSidIndicator = iff(SubjectUserSid == "S-1-0-0", "Yes", "No");
      // Step 2: per-account behavioural profile over the window.
      let Profile =
          NtlmNetwork
          | summarize
              DistinctTargetHosts = dcount(Computer),
              TargetHostSet       = make_set(Computer, 50),
              DistinctSourceIPs   = dcount(IpAddress),
              SourceIPSet         = make_set(IpAddress, 50),
              TotalNtlmLogons     = count(),
              NullSidSeen         = make_set(NullSidIndicator, 2),
              FirstSeen           = min(TimeGenerated),
              LastSeen            = max(TimeGenerated)
              by TargetUserName, TargetDomainName;
      // Step 3: total Kerberos vs NTLM for the same accounts, so we can spot
      // accounts that are NTLM-heavy relative to their OWN normal behaviour.
      // 4768/4769 are TGT/service-ticket requests = Kerberos activity.
      let KerbActivity =
          SecurityEvent
          | where TimeGenerated > ago(lookback)
          | where EventID in (4768, 4769)
          | extend KerbUser = tostring(TargetUserName)
          | summarize KerberosEvents = count() by KerbUser;
      Profile
      | join kind=leftouter (KerbActivity) on $left.TargetUserName == $right.KerbUser
      | extend KerberosEvents = coalesce(KerberosEvents, 0)
      // NTLM share of the account's authentication. An account that is almost
      // entirely NTLM despite being a domain account is more interesting than
      // one that is predominantly Kerberos with occasional NTLM.
      | extend NtlmShare = round(
                               todouble(TotalNtlmLogons) /
          todouble(TotalNtlmLogons + KerberosEvents),
                               3
                           )
      | extend WindowHours = round(todouble(datetime_diff('minute', LastSeen, FirstSeen)) / 60.0, 2)
      // -------------------------------------------------------------------
      // Triage score - ORDERING ONLY, not a confidence or a verdict.
      // Each component is a question a human would ask anyway; the score
      // just sorts the queue. Tune weights to the environment during the hunt.
      // -------------------------------------------------------------------
      | extend
          Score_FanOut    = case(
                            DistinctTargetHosts >= 20,
                            3,
                            DistinctTargetHosts >= 10,
                            2,
                            DistinctTargetHosts >= 3,
                            1,
                            0
                        ),
          Score_NtlmHeavy = case(
                            NtlmShare >= 0.9,
                            3,
                            NtlmShare >= 0.7,
                            2,
                            NtlmShare >= 0.5,
                            1,
                            0
                        ),
          Score_SourceSpread = case(
                               DistinctSourceIPs >= 10,
                               2,
                               DistinctSourceIPs >= 3,
                               1,
                               0
                           ),
          Score_Burst     = iff(DistinctTargetHosts >= 5 and WindowHours <= 1, 2, 0)
      | extend TriageScore = Score_FanOut + Score_NtlmHeavy + Score_SourceSpread + Score_Burst
      // Floor kept deliberately low - this is a hunt, not an alert.
      | where DistinctTargetHosts > 1
      | project
          TargetUserName,
          TargetDomainName,
          TriageScore,
          DistinctTargetHosts,
          DistinctSourceIPs,
          NtlmShare,
          TotalNtlmLogons,
          KerberosEvents,
          WindowHours,
          FirstSeen,
          LastSeen,
          TargetHostSet,
          SourceIPSet,
          NullSidSeen
      | sort by TriageScore desc, DistinctTargetHosts desc

