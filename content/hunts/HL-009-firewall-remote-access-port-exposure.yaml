implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // ── Remote-access port exposure via firewall rule creation
      // Detects inbound-allow firewall rules being created for commonly
      // abused remote-access ports (RDP, SSH, VNC, WinRM, SMB).

      let RemoteAccessPorts = dynamic(["3389", "22", "5900", "5901", "5985", "5986", "445", "4899", "23"]);
      DeviceProcessEvents
      | where Timestamp > ago(14d)                                                    // Lookback window — adjust to match hunt cadence
      | where ProcessCommandLine has_any (
          "New-NetFirewallRule", "netsh advfirewall firewall add rule"                 // Only rule creation — not modify/delete
      )
      | where ProcessIntegrityLevel != "System"                                       // Exclude GPO / endpoint management
      | where ProcessCommandLine has_any ("Inbound", "dir=in")                        // Must be an inbound rule
      | where ProcessCommandLine has_any ("Allow", "action=allow")                    // Must permit traffic, not block
      | extend ExtractedPort = extract(
          @"(?i)(?:LocalPort[= ]+|localport=)(\d+)", 1, ProcessCommandLine           // Handles -LocalPort 3389 and localport=3389
      )
      | where ExtractedPort in (RemoteAccessPorts)                                    // Filter to known remote-access ports only
      | extend ServiceName = case(
          ExtractedPort == "3389",  "RDP",                                            // Remote Desktop Protocol
          ExtractedPort == "22",    "SSH",                                            // Secure Shell
          ExtractedPort == "5900",  "VNC",                                            // Virtual Network Computing
          ExtractedPort == "5901",  "VNC",
          ExtractedPort == "5985",  "WinRM-HTTP",                                     // Windows Remote Management
          ExtractedPort == "5986",  "WinRM-HTTPS",
          ExtractedPort == "445",   "SMB",                                            // Server Message Block
          ExtractedPort == "4899",  "Radmin",                                         // Remote Administrator
          ExtractedPort == "23",    "Telnet",                                         // Unencrypted remote shell
          "Unknown"
      )
      | project
          Timestamp,
          DeviceName,
          AccountName,
          AccountUpn,
          ServiceName,                                                                // Human-readable service label
          ExtractedPort,
          FirewallCommand   = ProcessCommandLine,
          InitiatingProcess = InitiatingProcessFileName,                              // What spawned the firewall change
          InitiatingPath    = InitiatingProcessFolderPath,
          ProcessHash       = InitiatingProcessSHA256,                                // For TI lookup and exclusion lists
          IntegrityLevel    = ProcessIntegrityLevel
      | order by Timestamp desc

