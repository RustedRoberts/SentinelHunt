# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
id: HL-016
title: AiTM Session Cookie Replay - Cross-Device Sign-In Fingerprint Drift
summary: >
  Detects Adversary-in-the-Middle (AiTM) session cookie theft by finding a
  single Entra ID sign-in session (SessionId) whose sign-in events span more
  than one device, browser, operating system, IP address, or country within a
  short time window. A legitimate user's session token stays on the device
  and browser that requested it; the same token appearing from a second
  fingerprint shortly afterwards is the signature of a stolen-and-replayed
  session cookie, the technique behind phishing kits such as Tycoon 2FA and
  Sneaky 2FA.

hypothesis: |
  AiTM phishing-as-a-service kits (Tycoon 2FA, Sneaky 2FA, Evilginx-derived
  proxies) sit between the victim and Entra ID, relaying the real
  authentication flow - including MFA - and capturing the resulting session
  cookie/token once the victim completes sign-in. The operator then imports
  that cookie into their own browser session and resumes the user's
  authenticated session directly against Microsoft 365, without needing the
  password or a second MFA prompt.

  The session identifier issued by Entra ID (`SessionId`) is bound to the
  token, not to the device that requested it. When the operator replays the
  stolen cookie, Entra ID logs a new sign-in event carrying the SAME
  `SessionId` as the victim's original sign-in, but with a different
  `EntraIdDeviceId`, `Browser`, `OSPlatform`, `UserAgent`, `IPAddress`, and
  often `Country`. This is physically distinct from normal user behaviour: a
  human does not authenticate once on their laptop and, minutes later, the
  exact same session token re-appears from an unrelated device on a
  different continent.

  This hunt groups sign-in events by `SessionId` + `AccountUpn` over a short
  evaluation window and flags any session that exhibits more than one
  distinct device/browser/OS fingerprint AND more than one distinct IP
  address or country. The combination of "same session token, different
  fingerprint, short time gap" is the high-fidelity signal - each element
  alone (new device, new IP, new country) is common and benign; their
  co-occurrence on a single session identifier is not.

  Built on `EntraIdSignInEvents`, the table that replaced the preview
  `AADSignInEventsBeta` on 9 December 2025 (Microsoft Entra ID P2 required).
  This is distinct from, and complementary to, the `SigninLogs`-based
  per-user behavioural baseline in HL-010 - that hunt looks for anomalies
  relative to a user's history; this hunt looks for an internal
  inconsistency within a single session, with no baseline required.

author: RustedRoberts
updated: "2026-06-14"
version: "1.0"

