# ---------------------------------------------------------------------------
# Detection detail
# ---------------------------------------------------------------------------
whatYoullSee: |
  A true positive is a `SessionId` (and `AccountUpn`) for which sign-in
  events occur from more than one distinct device/browser/OS fingerprint
  AND more than one distinct IP address or country, all within
  `maxFingerprintGapHours` of each other.

  Typical pattern for AiTM session-cookie theft:

  - First event: the victim's genuine sign-in, e.g. `EntraIdDeviceId`
    matching their managed laptop, `Browser` = "Edge 124", `Country` = "GB",
    `IPAddress` on the corporate egress range, `ConditionalAccessStatus` = 0
    (policies applied, MFA satisfied).
  - Second event (minutes to a few hours later): the SAME `SessionId`,
    `EntraIdDeviceId` empty or different, `Browser`/`OSPlatform` different
    (often a generic "Chrome"/"Linux" signature from the attacker's VPS),
    `IPAddress` and `Country` different - frequently a hosting/VPS ASN rather
    than a residential or corporate range, and `ConditionalAccessStatus` may
    show policies were NOT re-evaluated because the token was already issued.

  Results include `DistinctFingerprints`, `DistinctIPs`, `DistinctCountries`,
  the `Severity` classification (Critical when countries differ, High when
  IPs and devices both differ within one country, Medium otherwise), and the
  `make_set` arrays of every IP/country/device/browser/OS/application seen
  for that session - this gives the analyst the full picture of the session
  without a follow-up query.

# ---------------------------------------------------------------------------
# Triage and investigation
# ---------------------------------------------------------------------------
investigationSteps:
  - "Confirm the SessionId is genuinely shared: pull the raw EntraIdSignInEvents
    rows for this SessionId and AccountUpn and review CorrelationId,
    ReportId, and Timestamp for each - rule out a logging artefact before
    treating this as token replay."
  - "Compare the two (or more) fingerprints side by side: EntraIdDeviceId,
    OSPlatform, Browser, UserAgent, IPAddress, Country, and
    ConditionalAccessStatus. A managed/compliant device followed by an
    unmanaged device with a generic browser string and a hosting-provider IP
    is the canonical AiTM pattern."
  - "Check ResourceDisplayName / Apps for both events: AiTM replay typically
    targets Exchange Online, SharePoint, or the Microsoft Graph shortly after
    the cookie is captured - mailbox and file access from the second
    fingerprint is the highest-priority follow-up."
  - "Pivot to AuditLogs / CloudAppEvents for the AccountUpn in the hour
    following the second fingerprint's first appearance: look for mailbox
    rule creation, OAuth app consents, mass downloads, or forwarding rule
    changes - these are the actions the stolen session is typically used
    for."
  - "Check IPAddress / ASN reputation for the second fingerprint against
    threat intelligence - AiTM relay infrastructure is frequently hosted on
    commodity VPS providers and may already be flagged."
  - "If confirmed: revoke all refresh tokens and sessions for the account
    (`Revoke-MgUserSignInSession` or the Entra portal 'Revoke sessions'
    action), force a password reset, and re-register MFA. Session revocation
    is the only effective remediation - a password reset alone does not
    invalidate a stolen session cookie."
  - "Review the original phishing vector: search Defender for Office 365 /
    CloudAppEvents for the inbound message or link that preceded the
    victim's first sign-in in this session - identify and remediate the lure
    for other recipients."

falsePositives:
  - "Corporate VPN or proxy infrastructure that legitimately changes the
    egress IP/country mid-session (e.g. split-tunnel VPN reconnecting via a
    different regional exit node). Scope by reviewing whether the new IP
    belongs to known corporate VPN ranges - add these to an allow-list by
    ASN/CIDR rather than suppressing the whole hunt."
  - "Mobile users moving between Wi-Fi and cellular network mid-session,
    which can change IPAddress and occasionally the resolved Country for
    users near a border, while DeviceId/Browser/OS remain constant. This
    hunt requires BOTH a fingerprint change (device/browser/OS) AND an
    IP/country change, which substantially reduces this false-positive
    class - a pure network change alone will not fire."
  - "Shared kiosk or virtual desktop infrastructure (VDI/Citrix/AVD) where
    multiple physical endpoints present as the same session under a shared
    or pooled device identity. Baseline known VDI device IDs and exclude
    them, or move VDI populations to a separate, tuned variant of this hunt."
  - "Browser-in-browser federation flows and certain legitimate cross-app SSO
    handoffs can momentarily present a different ClientAppUsed/Browser value
    for the same session. If this is observed at volume for a specific
    ResourceDisplayName, add a scoped exclusion for that application rather
    than for the account or tenant-wide."

# ---------------------------------------------------------------------------
# Curator notes
# ---------------------------------------------------------------------------
curatorNotes: |
  New table (2026-06-14): this hunt is built on `EntraIdSignInEvents`, which
  replaced the preview `AADSignInEventsBeta` table on 9 December 2025 to
  remove its preview status and align naming with the rest of the product.
  `AADSignInEventsBeta` continued to coexist for a transition period but
  should now be considered retired - if adapting an older AADSignInEventsBeta
  query, repoint it at `EntraIdSignInEvents`; column names are unchanged.
  `EntraIdSignInEvents` requires a Microsoft Entra ID P2 licence and is queried
  via Defender XDR Advanced Hunting, NOT the `SigninLogs` table used by
  HL-010 in Sentinel Log Analytics - the two are complementary, not
  interchangeable, and a tenant without Defender XDR onboarded will not have
  this table available.

  Boolean field heads-up: Microsoft is changing several advanced-hunting
  boolean columns from numeric (1/0) to textual (True/False) from 25 February
  2026. `IsConfidentialClient` and `IsGuestUser` on this table are typed as
  `boolean` and may be affected; `IsManaged`, `IsCompliant`, and
  `IsExternalUser` are typed `int` and are not part of that change. This hunt
  does not currently filter on any of those fields, so it is unaffected, but
  flagged here for anyone extending the query.

  Why SessionId and not CorrelationId: `CorrelationId` is unique per sign-in
  REQUEST and will always differ between the victim's and the operator's
  events - it cannot be used to link them. `SessionId` is the value carried
  by the session token itself and is therefore the field that is identical
  across the legitimate sign-in and the replayed-cookie sign-in. This
  distinction is the crux of the detection and is easy to get backwards.

  `maxFingerprintGapHours` (default 12h) is a deliberately generous window:
  AiTM kits typically relay the cookie within minutes, but operators have
  been observed delaying reuse to evade time-correlated detections. Widening
  this window increases recall but also increases the chance of catching
  benign VPN/roaming changes that happen to coincide with a fingerprint
  change for unrelated reasons - tune against the false-positive classes
  above before promoting.

  Maturity is Experimental: validate against a sample of known-benign
  multi-fingerprint sessions in your tenant (VDI, VPN populations) before
  promoting to a scheduled analytics rule. Pair with HL-010 - a session
  flagged here that ALSO drove a high score in HL-010's per-user baseline is
  very high confidence.

