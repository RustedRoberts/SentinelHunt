# ---------------------------------------------------------------------------
# Implementations
# ---------------------------------------------------------------------------
implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // ===================================================================
      // AiTM Session Cookie Replay - Cross-Device Fingerprint Drift
      // -------------------------------------------------------------------
      // A stolen-and-replayed session cookie produces a second sign-in
      // event under the SAME SessionId but from a different device,
      // browser, OS, IP address, and/or country. Group by SessionId +
      // AccountUpn and flag sessions whose fingerprint is internally
      // inconsistent within a short time span.
      // ===================================================================
      // --- Tunable parameters -------------------------------------------
      let lookback                = 1d;    // evaluation window
      let maxFingerprintGapHours  = 12h;    // max span between first/last event to still flag
      EntraIdSignInEvents
      | where Timestamp > ago(lookback)
      | where ErrorCode == 0                          // successful sign-ins only
      | where isnotempty(SessionId) and isnotempty(AccountUpn)
      // A "fingerprint" is the device/browser/OS combination presenting the token.
      | extend FingerprintKey = strcat(
            tostring(EntraIdDeviceId), "|",
            tostring(OSPlatform), "|",
            tostring(Browser))
      | summarize
            Events               = count(),
            FirstSeen            = min(Timestamp),
            LastSeen             = max(Timestamp),
            DistinctFingerprints = dcount(FingerprintKey),
            DistinctIPs          = dcount(IPAddress),
            DistinctCountries    = dcount(Country),
            DistinctDevices      = dcount(EntraIdDeviceId),
            IPs                  = make_set(IPAddress, 10),
            Countries            = make_set(Country, 10),
            Devices              = make_set(EntraIdDeviceId, 10),
            Browsers             = make_set(Browser, 10),
            OSPlatforms          = make_set(OSPlatform, 10),
            Apps                 = make_set(ResourceDisplayName, 10),
            CAStatuses           = make_set(ConditionalAccessStatus, 5)
          by SessionId, AccountUpn
      | extend SessionSpan = LastSeen - FirstSeen
      | where SessionSpan <= maxFingerprintGapHours
      // Require BOTH a fingerprint change AND a network-location change -
      // either alone is common and benign (see falsePositives).
      | where DistinctFingerprints > 1
            and (DistinctIPs > 1 or DistinctCountries > 1)
      | extend Severity = case(
            DistinctCountries > 1, "Critical",
            DistinctIPs > 1 and DistinctDevices > 1, "High",
            "Medium")
      | project
            AccountUpn,
            SessionId,
            Severity,
            FirstSeen,
            LastSeen,
            SessionSpan,
            Events,
            DistinctFingerprints,
            DistinctIPs,
            DistinctCountries,
            Countries,
            IPs,
            Devices,
            Browsers,
            OSPlatforms,
            Apps,
            CAStatuses
      | order by Severity asc, SessionSpan asc

