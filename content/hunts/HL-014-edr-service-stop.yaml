# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
id: HL-014
title: EDR and Antivirus Service Stop via Service Control Manager
summary: >
  Detects attempts to stop or disable endpoint security services through the
  Windows Service Control Manager - using utilities such as sc.exe, net.exe,
  PowerShell Stop-Service, or WMI - targeting a curated list of known EDR and
  antivirus service names across major vendors. Stopping the protective
  service is a common defence-evasion precursor that allows an adversary to
  operate without real-time monitoring or telemetry collection.

hypothesis: |
  Endpoint security products (Microsoft Defender for Endpoint, CrowdStrike
  Falcon, SentinelOne, Carbon Black, Cybereason, Cortex XDR, Trend Micro,
  Symantec, Sophos, and similar) run their sensor and protection engines as
  one or more Windows services. While the core sensor services on a modern,
  well-configured EDR are usually protected against tampering (PPL,
  anti-tamper drivers, or tamper protection), adversaries routinely attempt
  to stop them anyway - either because tamper protection is not enabled,
  because an ancillary or management service is unprotected, or as a
  low-effort first attempt before escalating to a driver-based approach.

  The Service Control Manager exposes service-stop operations through several
  surfaces: "sc.exe stop", "sc.exe config ... start= disabled", "net stop",
  "powershell Stop-Service" / "Set-Service -StartupType Disabled", and the WMI
  Win32_Service.StopService method invoked via wmic.exe or PowerShell. Each of
  these spawns or drives a recognisable process with a command line
  referencing a security product service name. Correlating execution of these
  utilities against a curated list of EDR/AV service names produces a
  high-fidelity signal that defence impairment is being attempted, regardless
  of whether the stop actually succeeded.

author: RustedRoberts
updated: "2026-05-18"
version: "1.2"

