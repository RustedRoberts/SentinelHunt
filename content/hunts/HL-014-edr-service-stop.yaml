# ---------------------------------------------------------------------------
# Implementations
# ---------------------------------------------------------------------------
implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      // -------------------------------------------------------------------
      // EDR / AV service-stop via Service Control Manager
      // Detects sc.exe / net.exe / PowerShell / WMI driving a stop or
      // disable against a curated list of security-product service names.
      // List expanded from ZephrFish/edr-checker (vendor coverage) and
      // converted to EXACT service names - not the raw substring patterns.
      // -------------------------------------------------------------------
      let lookback = 7d;
      // Curated EDR/AV Windows *service* names by vendor. Extend/prune per
      // estate before promoting to Production.
      let SecurityServiceNames = dynamic([
          // --- Microsoft Defender ---
          "Sense", "WinDefend", "WdNisSvc", "MsSecFlt",
          "SecurityHealthService",
          // --- CrowdStrike ---
          "CSFalconService", "CSAgent",
          // --- SentinelOne ---
          "SentinelAgent", "SentinelStaticEngine", "SentinelHelperService",
          "LogProcessorService",
          // --- VMware Carbon Black ---
          "CbDefense", "CbDefenseWSC", "carbonblack", "CarbonBlackK",
          "cbstream",
          // --- Cybereason ---
          "CybereasonActiveProbe", "CybereasonAntiMalware",
          "CybereasonCRS",
          // --- Palo Alto Cortex XDR / Traps ---
          "cyserver", "cyverak", "cyvrtp", "Traps", "CyveraService",
          "tlaservice",
          // --- Trellix / FireEye / McAfee ---
          "xagt", "MfeAVSvc", "mfemms", "mfevtp", "macmnsvc",
          // --- Trend Micro ---
          "TmListen", "Ntrtscan", "TmCCSF", "tmbmsrv", "AMSP",
          // --- Symantec / Broadcom ---
          "SepMasterService", "SmcService", "SAVAdminService",
          "ccSvcHst",
          // --- Sophos ---
          "Sophos Endpoint Defense Service", "SAVService",
          "Sophos MCS Agent", "SntpService", "swi_service",
          // --- ESET ---
          "ekrn", "EraAgentSvc",
          // --- SecureWorks Red Cloak ---
          "redcloak", "ProcWall",
          // --- Tanium ---
          "Tanium Client",
          // --- Fortinet FortiEDR ---
          "FortiEDR Collector Service", "FortiEDRCollectorService",
          // --- Morphisec ---
          "MorphisecServiceAgent",
          // --- Webroot ---
          "WRSVC", "WRCoreService",
          // --- IBM QRadar / LogRhythm endpoint ---
          "scsm", "LogRhythm Agent"
      ]);
      // Stop / disable verbs across SCM surfaces.
      let StopVerbs = dynamic([
          "stop", "stop-service", "start= disabled", "startup disabled",
          "set-service", "stopservice", "delete"
      ]);
      DeviceProcessEvents
      | where Timestamp > ago(lookback)
      | where FileName in~ ("sc.exe", "net.exe", "net1.exe",
                            "powershell.exe", "pwsh.exe", "wmic.exe")
      | extend CmdLower = tolower(ProcessCommandLine)
      | where CmdLower has_any (StopVerbs)
      | where CmdLower has_any (SecurityServiceNames)
      // Reduce obvious query/inspection noise.
      | where CmdLower !has "sc query"
            and CmdLower !has "get-service"
      // Treat a Set-Service line as relevant only when it disables startup.
      | where not(CmdLower has "set-service" and CmdLower !has "disabled")
      | project
          Timestamp,
          DeviceName,
          AccountName,
          ActionUtility       = FileName,
          ProcessCommandLine,
          InitiatingProcess   = InitiatingProcessFileName,
          InitiatingPath      = InitiatingProcessFolderPath,
          InitiatingAccount   = InitiatingProcessAccountName,
          InitiatingProcessSHA256
      | order by Timestamp desc

