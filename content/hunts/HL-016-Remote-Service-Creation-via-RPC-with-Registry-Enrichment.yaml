implementations:
  - platform: Microsoft Sentinel
    language: KQL
    query: |
      let remoteServicesInterface = '367abb81-9844-35f1-ad32-98f038001003';
      let serviceCreationOpnums = dynamic([12, 24, 44, 45, 60]); // RCreateServiceW, RCreateServiceA, RCreateServiceWOW64A, RCreateServiceWOW64W, RCreateWowService
      let timeWindow = 30s;
      let rpcEvents =
          DeviceEvents
          | where ActionType == 'InboundRemoteRpcCall'
          | extend AdditionalFields = parse_json(AdditionalFields)
          | extend
              RpcInterface = tostring(AdditionalFields.RpcInterfaceUuid),
              OpNum = toint(AdditionalFields.RpcOpNum)
          | where RpcInterface == remoteServicesInterface and OpNum in (serviceCreationOpnums)
          | project
              RpcTime = Timestamp,
              TenantId,
              DeviceName = tolower(DeviceName),
              DeviceId,
              OpNum,
              // Network context - who connected and from where
              SourceIP = RemoteIP,
              SourcePort = RemotePort,
              DestinationIP = LocalIP,
              // Caller identity recovered from the raw event columns (not AdditionalFields)
              CallerAccountName = AccountName,
              CallerAccountDomain = AccountDomain,
              CallerAccountSid = AccountSid,
              // RPC authentication context from AdditionalFields
              RpcAuthLevel = toint(AdditionalFields.RpcAuthenticationLevel),
              RpcAuthService = toint(AdditionalFields.RpcAuthenticationService),
              RpcProtocolSequence = toint(AdditionalFields.RpcProtocolSequence);
      let serviceKeys =
          DeviceRegistryEvents
          // Use ControlSet\d+ regex - MDE resolves and logs the actual hive path,
          // not the CurrentControlSet symlink, so filtering on CurrentControlSet returns nothing
          | where RegistryKey matches regex @'SYSTEM\\ControlSet\d+\\Services'
          | where ActionType in ('RegistryKeyCreated', 'RegistryValueSet')
          | extend ServiceName = tolower(extract(@'Services\\([^\\]+)', 1, RegistryKey))
          | project
              RegTime = Timestamp,
              DeviceName = tolower(DeviceName),
              ServiceName,
              RegistryKey,
              RegistryValueName,
              RegistryValueData;
      rpcEvents
      | join kind=inner (serviceKeys) on DeviceName
      | where RegTime between ((RpcTime - timeWindow) .. (RpcTime + timeWindow))
      // Pivot the registry value rows so each service appears as a single enriched row
      // with the most valuable fields surfaced directly rather than one row per registry value
      | summarize
          ServiceName = take_any(ServiceName),
          ImagePath = take_anyif(RegistryValueData, RegistryValueName == 'ImagePath'),
          DisplayName = take_anyif(RegistryValueData, RegistryValueName == 'DisplayName'),
          ObjectName = take_anyif(RegistryValueData, RegistryValueName == 'ObjectName'),
          StartType = take_anyif(RegistryValueData, RegistryValueName == 'Start'),
          DeleteFlag = take_anyif(RegistryValueData, RegistryValueName == 'DeleteFlag')
          by RpcTime, TenantId, DeviceName, DeviceId, OpNum, SourceIP, SourcePort,
             DestinationIP, CallerAccountName, CallerAccountDomain, CallerAccountSid,
             RpcAuthLevel, RpcAuthService
      // Flag transient services (DeleteFlag=1 means SCM removes the key on service stop - classic PsExec pattern)
      | extend IsTransientService = (DeleteFlag == '1')
      | extend OpNumDescription = case(
          OpNum == 12, 'RCreateServiceW',
          OpNum == 24, 'RCreateServiceA',
          OpNum == 44, 'RCreateServiceWOW64A',
          OpNum == 45, 'RCreateServiceWOW64W',
          OpNum == 60, 'RCreateWowService',
          'Unknown')
      | extend Description = strcat(
          'Remote service creation via ', OpNumDescription, ' observed on ', DeviceName, '. ',
          'Caller ', CallerAccountDomain, '\\', CallerAccountName, ' from ', SourceIP, ' ',
          case(
              IsTransientService, 'registered transient service ',
              'registered service '
          ),
          '"', ServiceName, '"',
          iff(isnotempty(ImagePath), strcat(' (', ImagePath, ')'), ''),
          iff(isnotempty(ObjectName) and ObjectName != 'LocalSystem', strcat(' running as ', ObjectName), ''),
          '.'
      )
      | project
          RpcTime,
          TenantId,
          DeviceName,
          Description,
          CallerAccountDomain,
          CallerAccountName,
          CallerAccountSid,
          SourceIP,
          SourcePort,
          DestinationIP,
          OpNum,
          OpNumDescription,
          ServiceName,
          ImagePath,
          DisplayName,
          ObjectName,
          StartType,
          IsTransientService,
          RpcAuthLevel,
          RpcAuthService
      | sort by RpcTime desc

